query CartInput {
  cart {
    lines {
      id
      cost {
        subtotalAmount {
          amount
        }
      }
    }
  }
   shop {
    customDiscountSettings: metafield(
      namespace: "volume_discount_settings"
      key: "product_volume_rules"
    ) {
      type
      value
      # If your generated types support it and you're using Rust, you'd use jsonValue;
      # for JS, type + value is usually enough and value is a string.
      # jsonValue
    }
  }
}
 