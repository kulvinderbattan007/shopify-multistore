query CartInput {
  cart {
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id          # variant ID
          product {
            id        # <-- product ID you want
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
  shop {
    customDiscountSettings: metafield(
      namespace: "volume_discount_settings"
      key: "product_volume_rules"
    ) {
      type
      value
    }
  }
}